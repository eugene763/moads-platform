services:
  postgres:
    image: postgres:16-alpine
    container_name: moads-local-postgres
    environment:
      POSTGRES_DB: moads_local
      POSTGRES_USER: moads_local
      POSTGRES_PASSWORD: moads_local
    ports:
      - "5432:5432"
    volumes:
      - moads_local_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moads_local -d moads_local"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  moads_local_postgres:
